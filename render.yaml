# Render Blueprint for the PMS: Django API, React static site, and Postgres.
# Docs: https://render.com/docs/blueprint-spec
#
# The persistent disk below is for uploaded media files. Render disks require a
# paid web-service instance, and only files written under the mount path survive
# deploys/restarts. If you remove the disk, uploads become ephemeral unless you
# add object storage such as S3 or Cloudflare R2.

databases:
  - name: pms-db
    databaseName: pmsdb
    user: pms
    plan: free

services:
  - type: web
    name: pms-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    healthCheckPath: /healthz/
    disk:
      name: pms-media
      mountPath: /var/data/media
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: pms-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: WEB_CONCURRENCY
        value: "2"
      - key: COOKIE_SAMESITE
        value: "None"
      - key: DATA_UPLOAD_MAX_MEMORY_SIZE
        value: "10485760"
      - key: FILE_UPLOAD_MAX_MEMORY_SIZE
        value: "10485760"

      # Fill these in the Render dashboard after the public URLs are assigned.
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

      # Optional Google Sheets reservation sync. Leave blank to disable.
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_SHEETS_YEAR
        sync: false

  - type: web
    name: pms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: same-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      # Proxy /api to the backend so the browser sees ONE origin. This makes the
      # session/CSRF cookies first-party, which iOS/Safari requires (it blocks
      # cross-site cookies). The /api rule MUST come before the SPA catch-all.
      - type: rewrite
        source: /api/*
        destination: https://property-management-system-beeo.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # IMPORTANT: leave VITE_API_BASE_URL EMPTY when using the /api proxy above.
      # The SPA then calls /api on its own origin and the proxy relays it to the
      # backend. Setting it to the backend URL re-introduces the cross-site issue.
      - key: VITE_API_BASE_URL
        sync: false
